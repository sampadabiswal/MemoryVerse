<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MemoryVerse</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- Galaxy Background -->

<div id="galaxy"></div>

<div class="overlay"></div>

<!-- Intro -->

<section class="intro">

<div class="logo-box">

<div class="memory-logo">

🌌 MEMORYVERSE

</div>

</div>

<div class="intro-content">

<h1>

Happy Birthday ❤️

</h1>

<h2>

A New Story Begins...

</h2>

<p>

Every memory tells a story.

Every smile becomes a chapter.

Every chapter deserves its own universe.

</p>

<button id="enterBtn">

▶ Enter MemoryVerse

</button>

</div>

</section>

<!-- Stars -->

<div class="stars">

<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>

</div>

<!-- Music -->

<audio id="bgMusic" loop>

<source src="assets/music/background.mp3" type="audio/mpeg">

</audio>

<script>

// Galaxy

const galaxy=document.getElementById("galaxy");

for(let i=0;i<350;i++){

const star=document.createElement("div");

star.className="star";

const size=Math.random()*3+1;

star.style.width=size+"px";

star.style.height=size+"px";

star.style.left=Math.random()*100+"%";

star.style.top=Math.random()*100+"%";

star.style.position="absolute";

star.style.background="white";

star.style.borderRadius="50%";

star.style.opacity=Math.random();

star.style.animation=`twinkle ${2+Math.random()*4}s infinite`;

galaxy.appendChild(star);

}

// Enter Button

const music=document.getElementById("bgMusic");

document.getElementById("enterBtn").onclick=()=>{

music.volume=.4;

music.play().catch(()=>{});

document.getElementById("enterBtn").innerHTML="Loading...";

setTimeout(()=>{

window.location.href="home.html";

},2000);

};

</script>

</body>

</html>
